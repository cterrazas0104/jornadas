<!DOCTYPE html>
<html>
<head>
    <title>Escáner de Asistencia</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4">Escáner de Asistencia</h1>
        <div id="reader" style="width: 100%;"></div>
        <div id="resultado" class="mt-4 p-3 rounded font-bold text-center"></div>
    </div>

    <script>
        function onScanSuccess(decodedText) {
            // El QR tiene el formato "JORNADA2026-MATRICULA"
            const matricula = decodedText.split('-')[1];
            
            // Enviamos la matrícula a Apps Script (debes actualizar la URL a una función doPost que llame a marcarAsistencia)
            fetch('https://script.google.com/macros/s/AKfycbx377YI_aPw2r4-iUkjAui7coHm-mIODeZKXboH9wJdciIjO9uFHNEUsdAfxzzapIdI/exec', {
                method: 'POST',
                body: JSON.stringify({ action: 'asistencia', matricula: matricula })
            })
            .then(res => res.text())
            .then(msg => {
                document.getElementById('resultado').innerText = msg;
                document.getElementById('resultado').classList.add('bg-green-200');
            });
        }
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
