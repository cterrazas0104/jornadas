     <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escáner de Asistencia</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white p-6 rounded shadow-lg text-center">
        <h1 class="text-2xl font-bold mb-4 text-blue-900">Escáner de Asistencia</h1>
        
        <!-- Campo para validar al docente -->
        <input type="email" id="emailDocente" placeholder="Tu correo institucional" class="w-full p-2 border mb-4 rounded">
        
        <div id="reader" class="w-full"></div>
        <div id="resultado" class="mt-4 p-4 rounded font-bold hidden"></div>
    </div>

    <script>
          const apiUrl = 'https://script.google.com/macros/s/AKfycbx377YI_aPw2r4-iUkjAui7coHm-mIODeZKXboH9wJdciIjO9uFHNEUsdAfxzzapIdI/exec';
        function onScanSuccess(decodedText) {
            const emailDocente = document.getElementById('emailDocente').value;
            if (!emailDocente) { alert("Ingresa tu correo primero"); return; }

            const matricula = decodedText.split('-')[1];
            
            fetch(apiUrl, {
                method: 'POST',
                body: JSON.stringify({ 
                    action: 'asistencia', 
                    matricula: matricula, 
                    correoDocente: emailDocente 
                })
            })
            .then(res => res.json())
            .then(data => {
                const resDiv = document.getElementById('resultado');
                resDiv.classList.remove('hidden', 'bg-red-200', 'bg-green-200');
                resDiv.classList.add(data.status === 'éxito' ? 'bg-green-200' : 'bg-red-200');
                resDiv.innerText = data.mensaje;
            });
        }

        // Cámara inteligente: ideal para trasera, fallback a cualquier otra disponible
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: 250,
            facingMode: { ideal: "environment" } 
        });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
