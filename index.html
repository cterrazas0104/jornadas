<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Tecnológica 2026 | CESBA Querétaro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <div class="container w-full max-w-lg mx-auto pt-20">
        <div class="w-full px-4 md:px-0 md:mt-8 mb-16 text-gray-800 leading-normal">
            
            <div class="bg-white border rounded-lg shadow-lg p-8">
                <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">Jornada Tecnológica 2026</h2>
                <p class="text-sm text-gray-600 text-center mb-8">Centro de Estudios Superiores del Bajío, Campus Querétaro.<br>Completa tu registro para apartar tu lugar en los talleres.</p>

                <form id="registroForm">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="matricula">Matrícula</label>
                        <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline focus:border-blue-500" 
                               id="matricula" type="number" placeholder="Ej. 2022684" required>
                    </div>

                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="idTaller">Selecciona tu Taller</label>
                        <div class="relative">
                            <select class="block appearance-none w-full border border-gray-300 text-gray-700 py-3 px-4 pr-8 rounded leading-tight focus:outline-none focus:bg-white focus:border-blue-500" 
                                    id="idTaller" required>
                                <option value="" disabled selected>Cargando talleres...</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex items-center justify-center mt-6">
                        <button id="btnSubmit" class="bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded w-full focus:outline-none focus:shadow-outline transition duration-200" type="submit">
                            Confirmar Inscripción
                        </button>
                    </div>
                </form>

                <div id="mensajeArea" class="mt-4 text-center text-sm font-bold hidden p-3 rounded"></div>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbx377YI_aPw2r4-iUkjAui7coHm-mIODeZKXboH9wJdciIjO9uFHNEUsdAfxzzapIdI/exec';

        // 1. Cargar talleres dinámicamente
        fetch(apiUrl)
        .then(response => response.json())
        .then(talleres => {
            const select = document.getElementById('idTaller');
            select.innerHTML = '<option value="" disabled selected>Elige una opción...</option>';
            talleres.forEach(taller => {
                let option = document.createElement('option');
                option.value = taller.ID_Taller;
                option.text = `${taller.ID_Taller} - ${taller.Nombre}`;
                select.appendChild(option);
            });
        })
        .catch(() => {
            document.getElementById('idTaller').innerHTML = '<option value="" disabled>Error al cargar</option>';
        });

        // 2. Lógica de envío
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const mensajeArea = document.getElementById('mensajeArea');
            btn.disabled = true;
            btn.innerText = "Inscribiendo...";

            const matricula = document.getElementById('matricula').value;
            const idTaller = document.getElementById('idTaller').value;

            fetch(apiUrl, {
                method: 'POST',
                mode: 'no-cors', // Necesario para evitar bloqueos de CORS
                body: JSON.stringify({ matricula: matricula, idTaller: idTaller }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(() => {
                mensajeArea.classList.remove('hidden', 'bg-red-100', 'text-red-700');
                mensajeArea.classList.add('bg-green-100', 'text-green-700');
                mensajeArea.innerText = "¡Inscripción recibida! Revisa tu correo.";
                document.getElementById('registroForm').reset();
            })
            .catch(() => {
                mensajeArea.classList.remove('hidden', 'bg-green-100', 'text-green-700');
                mensajeArea.classList.add('bg-red-100', 'text-red-700');
                mensajeArea.innerText = "Error al conectar con el servidor.";
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "Confirmar Inscripción";
            });
        });
    </script>
</body>
</html>
